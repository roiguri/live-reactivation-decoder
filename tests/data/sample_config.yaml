experiment_info:
  name: test_experiment

preprocessing:
  random_state: 42
  bandpass:
    l_freq: 1.0
    h_freq: 40.0
    method: iir
    notch: 50.0
  resample:
    target_rate: 250
  reject_criteria:
    hard_amplitude: 1.5e-4
    flat_threshold: 0.5e-6
    noisy_z_score: 3.0
  ica:
    n_components: 20
    method: fastica
    fit_l_freq: 1.0
  epochs:
    tmin: -0.2
    tmax: 1.0
    baseline: [null, 0]

decoders:
  model: LDA
  params:
    solver: lsqr
    shrinkage: auto
  cv:
    k: 5
  tasks:
    - name: red decoder
      pos_labels: [red]
      neg_labels: [green, yellow]
    - name: yellow decoder
      pos_labels: [yellow]
      neg_labels: [green, red]

markers_mapping:
  events:
    - id: 1
      name: red
    - id: 2
      name: green
    - id: 3
      name: yellow
