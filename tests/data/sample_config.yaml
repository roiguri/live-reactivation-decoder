experiment_info:
  name: test_experiment

random_state: 42

decoders:
  model: LDA
  params:
    solver: lsqr
    shrinkage: auto
  cv:
    k: 5
  tasks:
    - name: red decoder
      pos_labels: [red]
      neg_labels: [green, yellow]
    - name: yellow decoder
      pos_labels: [yellow]
      neg_labels: [green, red]

markers_mapping:
  events:
    - id: 1
      name: red
    - id: 2
      name: green
    - id: 3
      name: yellow
