experiment_info:
  name: test_experiment

random_state: 42

preprocessing:
  resample_filter_stage: early

  channel_hygiene:
    drop_emg: true
    rename_hegoc_to_heog: true
    montage_name: easycap-M1
    afz_case_fix: true

  highpass:
    l_freq: 1.0
    method: iir

  notch:
    freq: 50.0

  ica:
    method: infomax
    extended: true
    n_components: 20
    fit_l_freq: 1.0
    iclabel:
      enabled: true
      drop_labels: ["muscle artifact", "eye blink", "heart beat", "line noise", "channel noise"]

  epochs:
    tmin: -0.2
    tmax: 1.0
    baseline: [null, 0]

  final_resample:
    target_rate: 100

decoders:
  model: LDA
  params:
    solver: lsqr
    shrinkage: auto
  cv:
    k: 5
  tasks:
    - name: red decoder
      pos_labels: [red]
      neg_labels: [green, yellow]
    - name: yellow decoder
      pos_labels: [yellow]
      neg_labels: [green, red]

markers_mapping:
  events:
    - id: 1
      name: red
    - id: 2
      name: green
    - id: 3
      name: yellow
