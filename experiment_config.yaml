# Minimal 2-decoder demo. For the full FL config that trained the merged
# artifact in debug_snapshots/models/decoder_pipeline.joblib, see
# experiment_config.full.yaml.

experiment_info:
  name: Reactivation_Study_V1

random_state: 42

preprocessing:
  # Where to place LPF + decimation in the pipeline.
  #   "early" → on raw before ICA (faster ICA, paper-aligned)
  #   "late"  → on epochs after ICA (reference order, ICA on full-rate data)
  resample_filter_stage: early   # the A/B comparison toggles this

  channel_hygiene:
    drop_emg: true
    rename_hegoc_to_heog: true
    montage_name: easycap-M1
    afz_case_fix: true

  highpass:
    l_freq: 0.1
    method: iir          # IIR keeps offline/online causal parity

  ica:
    method: infomax
    extended: true
    n_components: null    # let MNE/infomax decide (rank = n_electrodes - 1 after avg ref)
    fit_l_freq: 1.0       # HP-only ICA fit copy; no LPF on the fit copy
    iclabel:
      enabled: true
      # Canonical mne-icalabel strings (with spaces). "other" is the
      # low-confidence catch-all — deliberately omitted so the operator
      # decides on those manually in the topomap review window.
      drop_labels: ["muscle artifact", "eye blink", "heart beat", "line noise", "channel noise"]

  epochs:
    tmin: -0.2
    tmax: 1.0
    baseline: null        # paper-aligned; set to [null, 0] to re-enable pre-stim mean subtraction

decoders:
  model: LDA          # LDA | Logistic | SVM
  params:             # valid keys depend on model (see config_models.py _VALID_PARAMS_BY_MODEL)
    solver: lsqr
    shrinkage: auto
  scale_method: standard   # standard | median | null
  cv:
    k: 5
  tasks:
    - name: red decoder
      pos_labels: [red]
      neg_labels: [green, yellow]
    - name: yellow decoder
      pos_labels: [yellow]
      neg_labels: [green, red]

markers_mapping:
  # Parallel-port codes recorded as analog plateaus on the trigger channel.
  # Other codes seen in the data (e.g. start_*, stop_*, codes 7-10/14-15/19-20)
  # remain on raw.annotations for diagnostics but are not epoched.
  events:
    - id: 11
      name: red
    - id: 12
      name: green
    - id: 13
      name: yellow
    # - id: 16
    #   name: living_room
    # - id: 17
    #   name: bathroom
    # - id: 18
    #   name: kitchen
