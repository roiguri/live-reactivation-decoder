experiment_info:
  name: Reactivation_Study_V1

preprocessing:
  random_state: 42
  bandpass:
    l_freq: 0.1
    h_freq: 40.0
    method: iir
    notch: 50.0
  resample:
    target_rate: 256
  reject_criteria:
    hard_amplitude: 1.5e-4   # hard pre-filter before AutoReject (V)
    flat_threshold: 0.5e-6   # channel std below this → flat (V)
    noisy_z_score: 3.0       # channel std z-score above this → noisy
  ica:
    n_components: 25
    method: fastica
    fit_l_freq: 1.0
  epochs:
    tmin: -0.2
    tmax: 1.0
    baseline: [null, 0]   # null = start of epoch

decoders:
  random_state: 42
  model: LDA          # LDA | Logistic | SVM
  params:             # valid keys depend on model (see config_models.py _VALID_PARAMS_BY_MODEL)
    solver: lsqr
    shrinkage: auto
  scale_method: standard   # standard | median | null
  cv:
    k: 5
  tasks:
    - name: red decoder
      pos_labels: [red]
      neg_labels: [green, yellow]
    - name: yellow decoder
      pos_labels: [yellow]
      neg_labels: [green, red]

markers_mapping:
  # Unmapped events will be ignored by the decoder.
  events:
    - id: 1
      name: red
    - id: 2
      name: green
    - id: 3
      name: yellow
