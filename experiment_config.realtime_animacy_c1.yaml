# Real-Time Task — animate-vs-rest and inanimate-vs-rest decoders.
#
# Same as experiment_config.realtime_animacy.yaml, with C=1 (stronger
# regularization) instead of C=100 — for comparing decoder regularization
# strength via a seeded debug snapshot (debug_snapshots/animacy_fl_c1).
#
# Built for the *real-time* paradigm (NOT the binding experiment) of
# https://github.com/Dezachyo/memory-decoder-realtime-task
# Decoders train on the Functional Localizer stage, where feature images are
# shown and tagged on the parallel port (address 0x5EFC).
#
# Trigger derivation (src/enums/Enums.py + src/tools/functional_localizer.py):
#   In _show_feature(), the pulse code is keyed by the image-file *stem* when
#   that stem exists in ParallelPortEnums.FEATURE_SHOW_TO_PULSE_CODE, otherwise
#   by the feature name. The animacy images are named animate_01..03 /
#   inanimate_01..03 — those stems ARE in the map — so animacy stimuli emit the
#   PER-IMAGE codes below (111-113, 116-118), never the feature-level
#   SHOW_ANIMATE=21 / SHOW_INANIMATE=22.
#   real_time_task.py runs the localizer with categories = ["animacy"], so only
#   the animacy codes are emitted (no color/scene markers).
#
# Real-time task encoding + retrieval triggers (RealTimeTaskTriggers):
#   Note: SHOW_VERB=81 and SHOW_CUE_VERB=84 are defined in the enum but never
#   sent — per-verb triggers (201-206 / 221-226) are used instead.
#   Encoding: CoupleLearning._show_verb() → LEARNING_VERB_TO_TRIGGER[verb]
#             CoupleLearning._show_category_to_verb() → LEARNING_IMAGE_TO_TRIGGER
#             or SHOW_FEATURE=82 fallback, then ANSWER_FEATURE=83
#   Retrieval: RetrivalCouple._show_cue_verb() → RETRIEVAL_VERB_TO_TRIGGER[verb],
#              RECALL_KEY_PRESS=9, ANSWER_CUE_VERB=85
#              RetrivalCouple._ask_feature_question() → SHOW_FEATURE_QUESTION=88,
#              ANSWER_FEATURE_QUESTION=89
#   Verb ordering matches RealTimeTaskEnums.VERB_LIST indices 0-5.

experiment_info:
  name: RealTime_Animacy_FL

random_state: 42

decoders:
  model: Logistic     # LDA | Logistic | SVM  (logistic regression)
  params:
    # C=1 regularizes more strongly than the C=100 baseline config. class_weight:
    # null => unweighted (overrides the model default of "balanced"). solver=liblinear,
    # l1_ratio=1, max_iter=1000 come from the model defaults.
    l1_ratio: 1
    max_iter: 1000
    solver: liblinear
    C: 1
    class_weight: null
  scale_method: standard   # standard | median | null
  cv:
    k: 5
  tasks:
    # Each decoder separates its category from BOTH the opposite category and
    # the resting baseline. Positive = the three exemplar images of the target
    # class; negative = the opposite category's images plus both rest spans
    # (with + without fixation).
    - name: animate decoder
      pos_labels: [animate_01, animate_02, animate_03]
      neg_labels: [inanimate_01, inanimate_02, inanimate_03, rest_fixation, rest_no_fixation]
    - name: inanimate decoder
      pos_labels: [inanimate_01, inanimate_02, inanimate_03]
      neg_labels: [animate_01, animate_02, animate_03, rest_fixation, rest_no_fixation]

markers_mapping:
  # Parallel-port codes. Each id needs a distinct name (event_mapping is keyed
  # by name); the decoder tasks group the per-image names back into classes.
  events:
    - id: 111
      name: animate_01
    - id: 112
      name: animate_02
    - id: 113
      name: animate_03
    - id: 116
      name: inanimate_01
    - id: 117
      name: inanimate_02
    - id: 118
      name: inanimate_03
    # Resting-state delimiters (ParallelPortEnums REST_* codes). The rest block
    # runs at the start of the localizer: ~3 min with a fixation cross, then
    # ~3 min without (REST_DURATION = 180 s each). These mark the start/stop of
    # each span; the intervals block below tiles epoch-sized windows inside them.
    - id: 1
      name: rest_fixation_start
    - id: 2
      name: rest_fixation_end
    - id: 3
      name: rest_no_fixation_start
    - id: 4
      name: rest_no_fixation_end
    # --- Encoding (learning) phase ---
    # Per-verb triggers: fired when the verb appears on screen during learning.
    # Verb ordering matches RealTimeTaskEnums.VERB_LIST (index 0 → 201, etc.).
    - id: 201
      name: learning_verb_1
    - id: 202
      name: learning_verb_2
    - id: 203
      name: learning_verb_3
    - id: 204
      name: learning_verb_4
    - id: 205
      name: learning_verb_5
    - id: 206
      name: learning_verb_6
    # Per-image triggers: fired when the animacy image appears during learning.
    # Indices parallel the FL images (animate_01-03 = 211-213, inanimate = 214-216).
    - id: 211
      name: learning_animate_01
    - id: 212
      name: learning_animate_02
    - id: 213
      name: learning_animate_03
    - id: 214
      name: learning_inanimate_01
    - id: 215
      name: learning_inanimate_02
    - id: 216
      name: learning_inanimate_03
    # ANSWER_FEATURE (83): subject pressed ↑ to confirm the pair was encoded.
    - id: 83
      name: encoding_response
    # --- Retrieval phase ---
    # Per-verb retrieval cue triggers: fired at cue onset (start of the 7 s
    # mental-imagery / recall window). Same verb ordering as learning above.
    - id: 221
      name: retrieval_verb_1
    - id: 222
      name: retrieval_verb_2
    - id: 223
      name: retrieval_verb_3
    - id: 224
      name: retrieval_verb_4
    - id: 225
      name: retrieval_verb_5
    - id: 226
      name: retrieval_verb_6
    # RECALL_KEY_PRESS (9): subject pressed ↑ indicating successful recall.
    - id: 9
      name: recall_key_press
    # ANSWER_CUE_VERB (85): end of the 7 s retrieval window (verb disappears).
    - id: 85
      name: retrieval_end
    # SHOW_FEATURE_QUESTION (88): animate/inanimate question appears after recall.
    - id: 88
      name: feature_question
    # ANSWER_FEATURE_QUESTION (89): subject answered the feature question.
    - id: 89
      name: feature_answer

# Each interval tiles contiguous epoch-sized windows between its start and stop
# markers and labels them as a new class, usable as a task label above. Two rest
# classes (with / without fixation); both feed the decoders' negative class.
intervals:
  - name: rest_fixation
    start: rest_fixation_start
    stop: rest_fixation_end
  - name: rest_no_fixation
    start: rest_no_fixation_start
    stop: rest_no_fixation_end
